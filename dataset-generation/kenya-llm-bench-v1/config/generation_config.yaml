# Kenya-LLM-Bench-v1 Generation Configuration

dataset:
  name: "kenya-llm-bench-v1"
  version: "1.0.0"
  description: "CBC-aligned educational dialogue dataset for Kenya"
  target_size: 1000
  
generation:
  # Dialogue parameters
  min_dialogue_length: 6
  max_dialogue_length: 12
  default_dialogue_length: 8
  
  # Quality thresholds
  min_cultural_authenticity_score: 0.8
  min_pedagogical_effectiveness_score: 0.8
  
  # Distribution targets (percentages)
  grade_distribution:
    PP1: 8
    PP2: 8
    Grade1: 12
    Grade2: 12
    Grade3: 12
    Grade4: 12
    Grade5: 12
    Grade6: 8
    Grade7: 8
    Grade8: 4
    Grade9: 4
  
  subject_distribution:
    Mathematics: 40
    English: 25
    Kiswahili: 20
    Environmental Activities: 15
  
  cultural_context_distribution:
    kenyan_foods: 30
    kenyan_animals: 20
    kenyan_places: 20
    kenyan_scenarios: 30

pedagogical:
  # Teaching techniques to include
  techniques:
    - socratic_method
    - scaffolded_support
    - cultural_connection
    - guided_discovery
    - reinforcement
  
  # Question types for Socratic method
  socratic_questions:
    - "What do you notice about...?"
    - "How is this similar to...?"
    - "What would happen if...?"
    - "Can you explain why...?"
    - "What pattern do you see...?"
    - "How does this connect to...?"
  
  # Scaffolding levels
  scaffolding_levels:
    1: "Direct instruction with examples"
    2: "Guided practice with hints"
    3: "Independent practice with feedback"
    4: "Mastery demonstration"

cultural:
  # Language mixing patterns
  code_switching:
    frequency: 0.7  # 70% of dialogues include code-switching
    patterns:
      - "greeting_swahili_content_english"
      - "english_with_swahili_interjections"
      - "counting_in_swahili"
      - "cultural_terms_in_swahili"
  
  # Cultural authenticity requirements
  authenticity_criteria:
    - swahili_greetings
    - kenyan_food_references
    - local_scenarios
    - respectful_cultural_representation
    - natural_language_mixing

quality:
  # Validation criteria
  validation_checks:
    - curriculum_alignment
    - cultural_authenticity
    - pedagogical_soundness
    - language_quality
    - dialogue_coherence
  
  # Automatic rejection criteria
  rejection_criteria:
    - inappropriate_content
    - cultural_stereotypes
    - curriculum_misalignment
    - poor_language_quality
    - incoherent_dialogue

output:
  # File formats
  formats:
    - json
    - jsonl
    - parquet
  
  # Hugging Face configuration
  huggingface:
    organization: "syncsenta"
    repository: "kenya-llm-bench-v1"
    license: "cc-by-4.0"
    tags:
      - education
      - kenya
      - cbc-curriculum
      - swahili
      - cultural-ai
      - africa
      - tutoring
      - socratic-method
  
  # Dataset splits
  splits:
    train: 0.8
    validation: 0.1
    test: 0.1